<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>閉環論</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700;900&family=IM+Fell+English&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c1c;
  --gold: #c9a84c;
  --gold-light: #e8d5a3;
  --gold-dim: #6a5828;
  --cream: #e5d3b5;
  --dark-teal: #0e2a28;
  --dark-navy: #0d1535;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  min-height: 100vh;
  background: var(--bg);
  font-family: 'Noto Serif TC', serif;
  color: var(--cream);
  display: flex;
  justify-content: center;
}

.page {
  width: min(90vw, 680px);
  min-height: 100vh;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 50px 40px 40px;
}

/* ── Outer decorative frame ── */
.frame {
  position: fixed;
  inset: 14px;
  border: 1px solid var(--gold-dim);
  pointer-events: none;
  z-index: 0;
}
.frame::before {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1px solid rgba(201,168,76,0.18);
}

/* ── Corner dots (top/bottom center of frame) ── */
.dot-top, .dot-bottom {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.7;
  margin: 4px auto;
}

/* ── Corner medallions ── */
.medallion {
  position: fixed;
  width: 80px;
  height: 80px;
  z-index: 1;
}
.medallion.tl { top: 14px; left: 14px; }
.medallion.tr { top: 14px; right: 14px; }
.medallion.bl { bottom: 14px; left: 14px; }
.medallion.br { bottom: 14px; right: 14px; }

/* ── Title ── */
.title {
  font-size: clamp(44px, 9vw, 82px);
  font-weight: 700;
  letter-spacing: 0.35em;
  color: var(--cream);
  text-align: center;
  line-height: 1;
  margin-top: 30px;
  position: relative;
  z-index: 2;
}

.title-ornament {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60px;
  opacity: 0.85;
}

.title-line {
  width: 100%;
  max-width: 420px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 14px auto 10px;
}

.subtitle {
  font-size: clamp(11px, 2vw, 14px);
  letter-spacing: 0.4em;
  color: var(--cream);
  opacity: 0.8;
  text-align: center;
  margin-bottom: 12px;
}

.dot-small {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.6;
  margin: 6px auto;
}

/* ── Circle area ── */
.circle-zone {
  position: relative;
  width: min(80vw, 420px);
  aspect-ratio: 1;
  margin: 16px auto;
  flex-shrink: 0;
}

#star-canvas {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  display: block;
}

/* ── File links around the circle ── */
.file-links {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.file-link {
  position: absolute;
  pointer-events: all;
  text-decoration: none;
  color: var(--gold-light);
  font-size: clamp(8px, 1.5vw, 12px);
  letter-spacing: 0.08em;
  writing-mode: horizontal-tb;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  transition: color 0.3s, opacity 0.3s;
  opacity: 0.82;
}

.file-link:hover {
  color: #fff;
  opacity: 1;
}

.file-link .link-label {
  font-size: inherit;
  text-align: center;
  line-height: 1.4;
  max-width: 100px;
  word-break: break-all;
}

.file-link .link-line {
  display: block;
  background: var(--gold-dim);
  transition: background 0.3s;
}

.file-link:hover .link-line {
  background: var(--gold);
}

/* Left link */
.file-link.left {
  left: -8px;
  top: 50%;
  transform: translate(-100%, -50%);
  text-align: right;
  align-items: flex-end;
  padding-right: 10px;
}
.file-link.left .link-line {
  width: 24px;
  height: 1px;
}

/* Upper right link */
.file-link.upper-right {
  right: -8px;
  top: 18%;
  transform: translate(100%, -50%);
  text-align: left;
  align-items: flex-start;
  padding-left: 10px;
}
.file-link.upper-right .link-line {
  width: 24px;
  height: 1px;
}

/* Lower right link */
.file-link.lower-right {
  right: -8px;
  top: 78%;
  transform: translate(100%, -50%);
  text-align: left;
  align-items: flex-start;
  padding-left: 10px;
}
.file-link.lower-right .link-line {
  width: 24px;
  height: 1px;
}

/* ── Below circle ── */
.tagline {
  font-size: clamp(11px, 1.8vw, 13px);
  letter-spacing: 0.25em;
  color: var(--cream);
  opacity: 0.75;
  text-align: center;
  margin: 10px 0 8px;
}

.author {
  font-size: clamp(20px, 4vw, 32px);
  letter-spacing: 0.5em;
  color: var(--cream);
  text-align: center;
  margin: 14px 0 6px;
}

.year {
  font-size: clamp(11px, 2vw, 14px);
  letter-spacing: 0.35em;
  color: var(--cream);
  opacity: 0.65;
  text-align: center;
  margin-bottom: 8px;
}

/* ── Mode indicator ── */
.mode-badge {
  position: fixed;
  bottom: 24px;
  right: 24px;
  font-size: 10px;
  color: var(--gold-dim);
  letter-spacing: 0.1em;
  z-index: 10;
  opacity: 0.5;
}

/* ── Side decorations ── */
.side-ornament {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.3;
}
.side-ornament.left { left: 18px; }
.side-ornament.right { right: 18px; }
</style>

// ── Seeded PRNG for consistent background stars ───────────────────────
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 4294967296;
  };
}

// ── Draw star map ─────────────────────────────────────────────────────
function drawStarMap(isDay) {
  const canvas = document.getElementById('star-canvas');
  const size = canvas.offsetWidth;
  canvas.width = size * devicePixelRatio;
  canvas.height = size * devicePixelRatio;
  const ctx = canvas.getContext('2d');
  const dpr = devicePixelRatio;
  ctx.scale(dpr, dpr);

  const cx = size / 2, cy = size / 2, R = size / 2;

  // Clip to circle
  ctx.beginPath();
  ctx.arc(cx, cy, R - 1, 0, Math.PI * 2);
  ctx.clip();

  // Background gradient
  const bg = ctx.createRadialGradient(cx, cy - R * 0.2, 0, cx, cy, R);
  bg.addColorStop(0, '#0e1430');
  bg.addColorStop(0.6, '#080c1c');
  bg.addColorStop(1, '#060914');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, size, size);

  // Background field stars
  const rand = seededRand(isDay ? 42 : 99);
  for (let i = 0; i < 220; i++) {
    const angle = rand() * Math.PI * 2;
    const dist = Math.sqrt(rand()) * (R - 2);
    const x = cx + Math.cos(angle) * dist;
    const y = cy + Math.sin(angle) * dist;
    const r = rand() * 0.8 + 0.2;
    const alpha = rand() * 0.4 + 0.15;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,210,190,${alpha})`;
    ctx.fill();
  }

  // Faint concentric guide rings
  for (let ring = 1; ring <= 3; ring++) {
    ctx.beginPath();
    ctx.arc(cx, cy, R * ring / 3.5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(201,168,76,0.06)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Main stars
  const stars = isDay ? NORTH_STARS : SOUTH_STARS;
  stars.forEach(s => {
    const x = s.cx * size;
    const y = s.cy * size;
    // Check inside circle
    const dx = x - cx, dy = y - cy;
    if (dx*dx + dy*dy > (R-4)*(R-4)) return;

    const r = s.r;

    // Glow for bright stars
    if (s.glow) {
      const grd = ctx.createRadialGradient(x, y, 0, x, y, r * 6);
      grd.addColorStop(0, 'rgba(240,230,200,0.35)');
      grd.addColorStop(0.4, 'rgba(220,210,170,0.15)');
      grd.addColorStop(1, 'rgba(220,210,170,0)');
      ctx.beginPath();
      ctx.arc(x, y, r * 6, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Star core
    const sg = ctx.createRadialGradient(x, y, 0, x, y, r);
    sg.addColorStop(0, '#fff');
    sg.addColorStop(0.4, 'rgba(240,230,200,0.95)');
    sg.addColorStop(1, 'rgba(220,210,180,0)');
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = sg;
    ctx.fill();

    // Cross diffraction for brightest stars
    if (r >= 2.8) {
      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.strokeStyle = '#e8d5a3';
      ctx.lineWidth = 0.5;
      for (let a = 0; a < 4; a++) {
        const ang = a * Math.PI / 4;
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(ang) * r * 1.5, y + Math.sin(ang) * r * 1.5);
        ctx.lineTo(x + Math.cos(ang) * r * 5.5, y + Math.sin(ang) * r * 5.5);
        ctx.stroke();
      }
      ctx.restore();
    }
  });

  // Gold circle border
  ctx.beginPath();
  ctx.arc(cx, cy, R - 0.8, 0, Math.PI * 2);
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Inner thin ring
  ctx.beginPath();
  ctx.arc(cx, cy, R - 8, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(201,168,76,0.25)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

// ── Init ──────────────────────────────────────────────────────────────
function init() {
  const hour = new Date().getHours();
  const isDay = hour >= 6 && hour < 18;
  drawStarMap(isDay);

  const badge = document.getElementById('mode-badge');
  badge.textContent = isDay ? '北半球 · 白晝' : '南半球 · 夜晚';
}

window.addEventListener('load', init);
window.addEventListener('resize', () => {
  const hour = new Date().getHours();
  drawStarMap(hour >= 6 && hour < 18);
});
</script>
